{% extends "base.html" %}

{% block title %}Password changed{% endblock %}

{% block content %}
<style>
    .success-box {
        background: rgba(255, 255, 255, 0.95);
        padding: 40px 36px;
        border-radius: 16px;
        max-width: 480px;
        width: 100%;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
        border: 1px solid rgba(76, 175, 80, 0.2);
        backdrop-filter: blur(12px);
        text-align: center;
    }

    .success-box h1 {
        margin-bottom: 14px;
        color: #2b2b2b;
        font-size: 32px;
        letter-spacing: 0.3px;
    }

    .success-box p {
        color: #666;
        margin-bottom: 28px;
        font-size: 15px;
        line-height: 1.6;
    }

    .success-box .btn {
        display: inline-block;
        padding: 13px 28px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        text-decoration: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.24);
    }

    .success-box .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 28px rgba(102, 126, 234, 0.32);
    }
</style>

<div class="form-container success-box">

    <h1>Password changed</h1>
    <p>Your password has been successfully changed.</p>

    <a href="{% url 'dashboard' %}" class="btn">Go to Dashboard</a>

</div>
{% endblock %}

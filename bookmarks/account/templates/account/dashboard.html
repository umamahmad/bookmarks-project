{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}
    
{% block content %}
    <style>
        .dashboard-card {
            width: min(720px, 100%);
            padding: 36px 32px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.16);
            color: #2a2a2a;
        }

        .dashboard-card h1 {
            margin-bottom: 16px;
            font-size: 2.1rem;
            letter-spacing: 0.4px;
            color: #2c3e50;
        }

        .dashboard-card p {
            line-height: 1.8;
            font-size: 1.05rem;
            color: #4d4d4d;
        }

        .dashboard-card a {
            color: #4f6ef7;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .dashboard-card a:hover {
            color: #2f4bdb;
        }
    </style>

    <div class="dashboard-card">
        <h1>Dashboard</h1>
        <p>
            Welcome to your dashboard. You can <a href="{% url 'edit' %}">edit your profile</a> or <a href="{% url 'password_change' %}">change your password</a>.
        </p>
    </div>
{% endblock %}
